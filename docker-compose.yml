x-install-test-common: &install-test-common
    working_dir: /repo
    volumes:
        - .:/repo:ro
    environment:
        INSTALL_DIR: /tmp/wolfsh-install
        GITHUB_REPO: ${GITHUB_REPO:-ToneAr/wolfsh}
        VERSION: ${VERSION:-latest}

services:
    debian:
        <<: *install-test-common
        image: debian:bookworm-slim
        command:
            - sh
            - -eu
            - -c
            - |
                apt-get update
                DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  mawk \
                  coreutils \
                  findutils
                rm -rf /var/lib/apt/lists/*

                echo "Testing install.sh on Debian with GITHUB_REPO=$${GITHUB_REPO} VERSION=$${VERSION}"
                sh /repo/install.sh --force
                /tmp/wolfsh-install/wolfsh --help || true

    arch:
        <<: *install-test-common
        image: archlinux:latest
        command:
            - sh
            - -eu
            - -c
            - |
                pacman -Sy --noconfirm --needed \
                  ca-certificates \
                  curl \
                  tar \
                  gzip \
                  gawk \
                  coreutils \
                  findutils

                echo "Testing install.sh on Arch with GITHUB_REPO=$${GITHUB_REPO} VERSION=$${VERSION}"
                sh /repo/install.sh --force
                /tmp/wolfsh-install/wolfsh --help || true

    redhat:
        <<: *install-test-common
        image: rockylinux:9
        command:
            - sh
            - -eu
            - -c
            - |
                dnf install -y --setopt=install_weak_deps=False \
                  ca-certificates \
                  tar \
                  gzip \
                  gawk \
                  findutils
                dnf clean all

                echo "Testing install.sh on Red Hat compatible Linux with GITHUB_REPO=$${GITHUB_REPO} VERSION=$${VERSION}"
                sh /repo/install.sh --force
                /tmp/wolfsh-install/wolfsh --help || true

    nix:
        <<: *install-test-common
        image: nixos/nix:latest
        command:
            - sh
            - -eu
            - -c
            - |
                nix-shell -p curl gnutar gzip gawk coreutils findutils cacert --run '
                  echo "Testing install.sh on Nix with GITHUB_REPO=$${GITHUB_REPO} VERSION=$${VERSION}"
                  sh /repo/install.sh --force
                  /tmp/wolfsh-install/wolfsh --help || true
                '
