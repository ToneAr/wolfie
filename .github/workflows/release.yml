name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "build*"
      - "test*"
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runs_on: '["self-hosted", "Linux", "X64", "wolfram-wstp"]'
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: linux-aarch64
            runs_on: '["self-hosted", "Linux", "ARM64", "wolfram-wstp"]'
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - name: macos-x86_64
            runs_on: '["self-hosted", "macOS", "X64", "wolfram-wstp"]'
            target: x86_64-apple-darwin
            archive: tar.gz
          - name: macos-aarch64
            runs_on: '["self-hosted", "macOS", "ARM64", "wolfram-wstp"]'
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: windows-x86_64
            runs_on: '["self-hosted", "Windows", "X64", "wolfram-wstp"]'
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify WSTP SDK Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${WSTP_COMPILER_ADDITIONS_DIRECTORY:-}" ]; then
            echo "::error::WSTP_COMPILER_ADDITIONS_DIRECTORY is required. Configure this self-hosted runner with Wolfram/WSTP for ${{ matrix.target }}."
            exit 1
          fi

          if [ ! -d "$WSTP_COMPILER_ADDITIONS_DIRECTORY" ]; then
            echo "::error::WSTP_COMPILER_ADDITIONS_DIRECTORY does not exist: $WSTP_COMPILER_ADDITIONS_DIRECTORY"
            exit 1
          fi

          echo "Using WSTP CompilerAdditions: $WSTP_COMPILER_ADDITIONS_DIRECTORY"

      - name: Verify WSTP SDK Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          if (-not $env:WSTP_COMPILER_ADDITIONS_DIRECTORY) {
            Write-Error "WSTP_COMPILER_ADDITIONS_DIRECTORY is required. Configure this self-hosted runner with Wolfram/WSTP for ${{ matrix.target }}."
            exit 1
          }

          if (-not (Test-Path -LiteralPath $env:WSTP_COMPILER_ADDITIONS_DIRECTORY -PathType Container)) {
            Write-Error "WSTP_COMPILER_ADDITIONS_DIRECTORY does not exist: $env:WSTP_COMPILER_ADDITIONS_DIRECTORY"
            exit 1
          }

          Write-Host "Using WSTP CompilerAdditions: $env:WSTP_COMPILER_ADDITIONS_DIRECTORY"

      - name: Build
        env:
          RUSTFLAGS: -C strip=symbols
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/build'))
        shell: bash
        run: |
          set -euo pipefail
          package="wolfram-cli-${{ matrix.name }}"
          mkdir "$package"
          cp "target/${{ matrix.target }}/release/wolfram-cli" "$package/"
          cp README.md "$package/"
          tar -czf "$package.tar.gz" "$package"

      - name: Package Windows
        if: matrix.archive == 'zip' && (startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/build'))
        shell: pwsh
        run: |
          $package = "wolfram-cli-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $package
          Copy-Item "target/${{ matrix.target }}/release/wolfram-cli.exe" $package
          Copy-Item README.md $package
          Compress-Archive -Path $package -DestinationPath "$package.zip"

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/build')
        uses: actions/upload-artifact@v4
        with:
          name: wolfram-cli-${{ matrix.name }}
          path: wolfram-cli-${{ matrix.name }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/build')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
